name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Release (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:win
        env:
          CI: true

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          name: wzxClaw ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/*.exe
            dist/*.msi
          body: |
            ## wzxClaw ${{ github.ref_name }}

            ### Install
            Download and run the `.exe` installer. No additional setup needed — configure your API keys inside the application after launch.

            ### Changelog
            See commit history for details.

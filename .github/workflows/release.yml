name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        # node-gyp (for node-pty) needs distutils, removed in Python 3.12+
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # @electron/rebuild requires Node >= 22.12.0
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-vite build && npx electron-builder --win --publish never
        env:
          CI: true

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          name: wzxClaw ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/*.exe
            dist/*.msi
          body: |
            ## wzxClaw ${{ github.ref_name }}

            ### Install
            Download and run the `.exe` installer. No additional setup needed — configure your API keys inside the application after launch.

            ### Changelog
            See commit history for details.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  desktop-test:
    name: Desktop Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wzxClaw_desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: wzxClaw_desktop/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test
        env:
          CI: true

  desktop-e2e-session:
    name: Desktop E2E Session Sync
    runs-on: ubuntu-latest
    needs: desktop-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: wzxClaw_desktop/package-lock.json

      - name: Install relay dependencies (forked by E2E harness)
        working-directory: relay
        run: npm install --no-audit --no-fund

      - name: Install desktop dependencies
        working-directory: wzxClaw_desktop
        run: npm install --legacy-peer-deps

      - name: Run E2E session sync suite
        working-directory: wzxClaw_desktop
        run: npm run test:e2e:session
        env:
          CI: true

  desktop-build-check:
    name: Desktop Build Check
    runs-on: ubuntu-latest
    needs: [desktop-test, desktop-e2e-session]
    defaults:
      run:
        working-directory: wzxClaw_desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: wzxClaw_desktop/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build (vite compile check)
        run: npx electron-vite build
        env:
          CI: true

  android-analyze-test:
    name: Android Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wzxClaw_android

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  android-build-apk:
    name: Android Build APK
    runs-on: ubuntu-latest
    needs: android-analyze-test
    if: github.ref == 'refs/heads/master'
    defaults:
      run:
        working-directory: wzxClaw_android

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release, no signing)
        run: flutter build apk --release --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: wzxClaw_android/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

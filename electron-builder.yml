appId: com.wzxclaw
productName: wzxClaw
directories:
  buildResources: build
  output: dist
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
  - "!{.env,.env.*}"
  - "!**/__tests__/*"
  - "!**/*.test.*"
  - "!**/*.spec.*"
  - "!.planning/*"
  - "!.eval-workspaces/*"
  - "!.eval-reports/*"
  - "!data/eval/*"
  - "!scripts/eval/*"
  - "!CLAUDE.md"
  - "!vitest.config.*"
  - "!*.tsbuildinfo"
  - "!**/*.log"
extraResources:
  - from: src/mobile-client
    to: mobile-client
    filter:
      - "**/*"
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: wzxClaw
npmRebuild: false


# wzxClaw SearXNG 元搜索引擎
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name searxng.5945.top;
    ssl_certificate /usr/syno/etc/www/certificate/le-5945/fullchain.pem;
    ssl_certificate_key /usr/syno/etc/www/certificate/le-5945/privkey.pem;
    include /etc/nginx/conf.d/ssl.compress.conf;
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

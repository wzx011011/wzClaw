version: "3.8"
services:
  searxng:
    image: searxng/searxng:latest
    container_name: wzxclaw-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=https://searxng.5945.top/
      - SEARXNG_SECRET=${SEARXNG_SECRET}

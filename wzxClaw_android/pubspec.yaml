name: wzxclaw_android
description: wzxClaw Android client - remote control for wzxClaw IDE via WebSocket
publish_to: "none"
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.0
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1
  mobile_scanner: ^5.2.0
  flutter_markdown: ^0.7.6
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  markdown: ^7.3.0
  google_fonts: ^6.1.0
  flutter_inappwebview: ^6.0.0
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  shelf: ^1.4.0
  shelf_web_socket: ^2.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"

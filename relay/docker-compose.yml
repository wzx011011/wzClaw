version: "3.8"

services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wzxclaw-relay
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN:?AUTH_TOKEN is required}
      - PORT=8080
      - RELAY_DATA_DIR=/app/data
    volumes:
      - relay-data:/app/data

volumes:
  relay-data:
